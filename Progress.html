<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Produksi</title>
    <style>
        :root {
            --bg-main: #0f172a; --bg-card: #1e293b; --bg-row-alt: #172033;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent-primary: #3b82f6; --accent-secondary: #0ea5e9; 
            --status-done-bg: rgba(16, 185, 129, 0.15); --status-done-text: #34d399;
            --status-wip-bg: rgba(245, 158, 11, 0.15); --status-wip-text: #fbbf24; 
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        
        .process-kpi-container { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; margin-bottom: 15px; }
        .process-card { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 12px 5px; text-align: center; border-radius: 8px; }
        .process-card.highlight { background: linear-gradient(180deg, rgba(59, 130, 246, 0.1), var(--bg-card)); border-color: var(--accent-primary); }
        .p-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; display: block; }
        .p-value { font-size: 1.8rem; font-weight: 700; color: #fff; margin-top: 5px; display: block; }
        .p-value.ready { color: var(--accent-secondary); } 

        .main-workspace { display: flex; flex: 1; overflow: hidden; gap: 15px; }
        .left-panel { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; }
        .right-panel { width: 340px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; }
        
        .client-summary-title { font-size: 0.95rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; }
        .client-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .client-name { font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .client-stats { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; gap: 5px; }
        .stat-box { background-color: rgba(15, 23, 42, 0.5); padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); }
        .stat-box .stat-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }
        .stat-box .stat-value { font-size: 1.3rem; font-weight: 700; }
        .stat-box .stat-value.wip { color: var(--status-wip-text); }
        .stat-box .stat-value.ready { color: var(--accent-secondary); }
        .stat-box .stat-value.sent { color: var(--status-done-text); }

        .table-header-wrapper { background-color: #1e293b; border-bottom: 1px solid #334155; }
        .table-body-wrapper { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 12px 8px; font-size: 0.85rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        th:nth-child(1), td:nth-child(1) { width: 11%; text-align: left; padding-left: 15px; }  
        th:nth-child(2), td:nth-child(2) { width: 9%; text-align: left; }   
        th { font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; }
        tbody tr { border-bottom: 1px solid var(--border-color); }
        tbody tr:nth-child(even) { background-color: var(--bg-row-alt); }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; width: 100%; max-width: 90px; }
        .badge.done { background-color: var(--status-done-bg); color: var(--status-done-text); }
        .badge.wip { background-color: var(--status-wip-bg); color: var(--status-wip-text); }
        .badge.empty { background-color: rgba(255,255,255,0.03); color: #64748b; font-weight: normal; }

        .sn-text { font-family: monospace; font-weight: 700; color: var(--accent-primary); }
        .unit-text { font-weight: 600; color: #e2e8f0; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="process-kpi-container">
        <div class="process-card"><span class="p-label">Assembling</span><span class="p-value" id="kpi-assembling">0</span></div>
        <div class="process-card"><span class="p-label">Welding</span><span class="p-value" id="kpi-welding">0</span></div>
        <div class="process-card"><span class="p-label">Leak Test</span><span class="p-value" id="kpi-leak">0</span></div>
        <div class="process-card"><span class="p-label">Filling</span><span class="p-value" id="kpi-filling">0</span></div>
        <div class="process-card"><span class="p-label">Covering</span><span class="p-value" id="kpi-covering">0</span></div>
        <div class="process-card"><span class="p-label">Alignment</span><span class="p-value" id="kpi-alignment">0</span></div>
        <div class="process-card"><span class="p-label">Painting</span><span class="p-value" id="kpi-painting">0</span></div>
        <div class="process-card highlight"><span class="p-label" style="color: var(--accent-secondary);">Ready</span><span class="p-value ready" id="kpi-ready">0</span></div>
        <div class="process-card"><span class="p-label">Delivered</span><span class="p-value" id="kpi-delivery">0</span></div>
    </div>

    <div class="main-workspace">
        <div class="left-panel">
            <div class="table-header-wrapper">
                <table>
                    <thead><tr><th>Serial Number</th><th>Unit</th><th>Assembling</th><th>Welding</th><th>Leak Test</th><th>Filling</th><th>Covering</th><th>Alignment</th><th>Painting</th><th>Schedule</th><th>Delivery</th></tr></thead>
                </table>
            </div>
            <div class="table-body-wrapper" id="table-wrapper">
                <table><tbody id="table-body"><tr><td colspan="11" style="padding: 30px; color: var(--text-muted);">Memuat Data...</td></tr></tbody></table>
            </div>
        </div>

        <div class="right-panel" id="client-panel">
            <div class="client-summary-title">Ringkasan Per Client</div>
        </div>
    </div>

    <script>
        const DEPLOY_URL = 'https://script.google.com/macros/s/AKfycbwDMWc-ZsQx2rD2E-eQotsXlN3NIBdnbb6XXC8Tv5PujiBRxOVr2zI8hqqgtjOqRqeJvA/exec'; 
        
        const currentMonthString = ["januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"][new Date().getMonth()];

        async function fetchSpreadsheetData() {
            try {
                const response = await fetch(DEPLOY_URL);
                if (response.ok) renderDashboard(await response.json());
            } catch (error) { console.error('Fetch error:', error); }
        }

        function getValueFuzzy(row, possibleKeys) {
            for (let key in row) {
                if (possibleKeys.includes(key.toString().trim().toLowerCase())) return row[key] ? row[key].toString().trim() : '';
            }
            return '';
        }

        function renderDashboard(data) {
            const tableBody = document.getElementById('table-body');
            const clientPanel = document.getElementById('client-panel');
            let kpi = { assembling: 0, welding: 0, leak: 0, filling: 0, alignment: 0, covering: 0, painting: 0, delivery: 0, ready: 0 };
            let clientData = {}; 
            let htmlRows = '';

            function evaluateStatus(cVal, nVal) {
                if (!cVal || cVal === '') return { class: 'empty', text: '-' };
                if (nVal && nVal !== '') return { class: 'done', text: cVal };
                return { class: 'wip', text: cVal };
            }

            data.forEach(row => {
                if (getValueFuzzy(row, ['periode']).toLowerCase() !== currentMonthString) return; 

                const sn = getValueFuzzy(row, ['serial number', 'sn']); 
                const unit = getValueFuzzy(row, ['unit']);
                const clientName = getValueFuzzy(row, ['client', 'customer']) || 'Lain-lain';

                if (!sn && !unit) return; 
                if (!clientData[clientName]) clientData[clientName] = { wip: 0, ready: 0, sent: 0 };

                const vAssy = getValueFuzzy(row, ['assembling']);
                const vWeld = getValueFuzzy(row, ['welding']);
                const vLeak = getValueFuzzy(row, ['leak test']);
                const vFill = getValueFuzzy(row, ['filling']);
                const vCov = getValueFuzzy(row, ['covering']);
                const vAlign = getValueFuzzy(row, ['alignment']);
                const vPaint = getValueFuzzy(row, ['painting']);
                const vQc = getValueFuzzy(row, ['quality control']); 
                const vSched = getValueFuzzy(row, ['schedule']);
                const vDeliv = getValueFuzzy(row, ['delivery']);

                const statAssy = evaluateStatus(vAssy, vWeld);
                const statWeld = evaluateStatus(vWeld, vLeak);
                const statLeak = evaluateStatus(vLeak, vFill);
                const statFill = evaluateStatus(vFill, vCov);      
                const statCov = evaluateStatus(vCov, vAlign);       
                const statAlign = evaluateStatus(vAlign, vPaint);   
                const statPaint = evaluateStatus(vPaint, vQc || vDeliv); 
                const statDeliv = vDeliv ? { class: 'done', text: vDeliv } : { class: 'empty', text: '-' };
                const statSched = vSched ? { class: 'empty', text: vSched } : { class: 'empty', text: '-' };

                if (statAssy.class === 'done') kpi.assembling++;
                if (statWeld.class === 'done') kpi.welding++;
                if (statLeak.class === 'done') kpi.leak++;
                if (statFill.class === 'done') kpi.filling++;
                if (statCov.class === 'done') kpi.covering++;
                if (statAlign.class === 'done') kpi.alignment++;
                if (statPaint.class === 'done') kpi.painting++;
                if (statDeliv.class === 'done') kpi.delivery++;

                if (vDeliv) clientData[clientName].sent++;
                else if (statPaint.class === 'done' && !vDeliv) { kpi.ready++; clientData[clientName].ready++; } 
                else clientData[clientName].wip++;

                htmlRows += `<tr><td class="sn-text">${sn || '-'}</td><td class="unit-text">${unit || '-'}</td>
                    <td><span class="badge ${statAssy.class}">${statAssy.text}</span></td><td><span class="badge ${statWeld.class}">${statWeld.text}</span></td>
                    <td><span class="badge ${statLeak.class}">${statLeak.text}</span></td><td><span class="badge ${statFill.class}">${statFill.text}</span></td>
                    <td><span class="badge ${statCov.class}">${statCov.text}</span></td><td><span class="badge ${statAlign.class}">${statAlign.text}</span></td>
                    <td><span class="badge ${statPaint.class}">${statPaint.text}</span></td><td><span class="badge empty">${statSched.text}</span></td>
                    <td><span class="badge ${statDeliv.class}">${statDeliv.text}</span></td></tr>`;
            });

            tableBody.innerHTML = htmlRows || `<tr><td colspan="11">Tidak ada data produksi bulan ini.</td></tr>`;

            let clientHtml = `<div class="client-summary-title">Ringkasan Per Client (Bulan Ini)</div>`;
            Object.keys(clientData).forEach(name => {
                clientHtml += `<div class="client-card"><div class="client-name">${name}</div><div class="client-stats">
                    <div class="stat-box"><div class="stat-label">WIP</div><div class="stat-value wip">${clientData[name].wip}</div></div>
                    <div class="stat-box"><div class="stat-label">READY</div><div class="stat-value ready">${clientData[name].ready}</div></div>
                    <div class="stat-box"><div class="stat-label">SENT</div><div class="stat-value sent">${clientData[name].sent}</div></div>
                </div></div>`;
            });
            clientPanel.innerHTML = clientHtml;

            ['assembling', 'welding', 'leak', 'filling', 'covering', 'alignment', 'painting', 'ready', 'delivery'].forEach(key => {
                document.getElementById(`kpi-${key}`).textContent = kpi[key];
            });

            autoScroll();
        }

        let autoScrollIntervalId;
        function autoScroll() {
            const container = document.getElementById('table-wrapper');
            if (autoScrollIntervalId) clearInterval(autoScrollIntervalId);
            container.scrollTop = 0;
            setTimeout(() => {
                if (container.scrollHeight > container.clientHeight) {
                    let currentScroll = 0, direction = 1, hold = 0;
                    autoScrollIntervalId = setInterval(() => {
                        if (hold > 0) { hold--; return; }
                        currentScroll += direction; container.scrollTop = currentScroll;
                        if (currentScroll >= (container.scrollHeight - container.clientHeight)) {
                            direction = 0; hold = 100; 
                            setTimeout(() => { currentScroll = 0; direction = 1; hold = 40; }, 4000);
                        }
                    }, 40);
                }
            }, 500);
        }

        setInterval(fetchSpreadsheetData, 60000);
        fetchSpreadsheetData();
    </script>
</body>
</html>
